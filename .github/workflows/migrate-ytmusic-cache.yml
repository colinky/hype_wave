name: Migrate YTMusic Cache To Supabase

on:
  workflow_dispatch:

jobs:
  migrate:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Restore latest YouTube Music bilingual cache
        uses: actions/cache/restore@v4
        with:
          path: ytmusic_cache.db
          key: migrate-ytmusic-cache-${{ github.run_id }}
          restore-keys: |
            ytmusic-cache-

      - name: Validate restored cache
        shell: bash
        run: |
          set -euo pipefail
          test -f ytmusic_cache.db
          python -c "import sqlite3; conn=sqlite3.connect('ytmusic_cache.db'); print('artists', conn.execute('SELECT COUNT(*) FROM artist_translations').fetchone()[0]); print('songs', conn.execute('SELECT COUNT(*) FROM song_translations').fetchone()[0])"

      - name: Migrate cache to Supabase PostgreSQL
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: python migrate_ytmusic_cache_to_postgres.py
