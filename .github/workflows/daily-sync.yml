name: Daily Unified Music Sync

on:
  workflow_dispatch:
  schedule:
    # 17:10 KST every day. GitHub Actions cron uses UTC.
    - cron: "10 8 * * *"

concurrency:
  group: daily-unified-music-sync
  cancel-in-progress: false

jobs:
  sync-all:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    permissions:
      contents: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Restore Sync Logs Cache
        uses: actions/cache/restore@v4
        with:
          path: logs/
          key: sync-logs-${{ github.run_id }}
          restore-keys: |
            sync-logs-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Restore YouTube Music browser auth file from secret
        shell: bash
        env:
          YTMUSIC_BROWSER_JSON: ${{ secrets.YTMUSIC_BROWSER_JSON }}
        run: |
          set -euo pipefail
          mkdir -p .secrets logs
          printf '%s' "$YTMUSIC_BROWSER_JSON" > .secrets/browser.json
          chmod 600 .secrets/browser.json

      - name: Restore DB from Supabase Storage
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: python sync_db_storage.py download

      - name: Run Enabled Sync Tasks
        shell: bash
        env:
          YTMUSIC_AUTH_FILE: .secrets/browser.json
        run: |
          set -euo pipefail
          python sync_all.py

      - name: Upload updated DB to Supabase Storage
        if: success()
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: python sync_db_storage.py upload

      - name: Upload All Sync Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: all-sync-logs
          path: logs/
          if-no-files-found: ignore

      - name: Save Sync Logs Cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: logs/
          key: sync-logs-${{ github.run_id }}

      - name: Commit and Push Historical Web Data
        if: success()
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # 프론트엔드 차트 데이터인 history.json만 추적하여 GitHub Pages 업데이트
          git add docs/api/history.json 2>/dev/null || true
          
          if ! git diff --cached --quiet; then
            git commit -m "chore: auto-update history.json [$(date +'%Y-%m-%d')]"
            git push origin HEAD:${{ github.ref_name }}
          else
            echo "No changes to commit"
          fi



          