name: Daily Unified Music Sync

on:
  workflow_dispatch:
  schedule:
    # 16:02 KST every day. GitHub Actions cron uses UTC.
    - cron: "2 7 * * *"

concurrency:
  group: daily-unified-music-sync
  cancel-in-progress: false

jobs:
  sync-all:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    permissions:
      contents: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"


      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Restore YouTube Music browser auth file from secret
        shell: bash
        env:
          YTMUSIC_BROWSER_JSON: ${{ secrets.YTMUSIC_BROWSER_JSON }}
        run: |
          set -euo pipefail
          mkdir -p .secrets
          printf '%s' "$YTMUSIC_BROWSER_JSON" > .secrets/browser.json
          chmod 600 .secrets/browser.json

      - name: Run Enabled Sync Tasks
        shell: bash
        env:
          YTMUSIC_AUTH_FILE: .secrets/browser.json
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          set -euo pipefail
          python sync_all.py

      - name: Commit and Push Historical Web Data
        if: success()
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # 프론트엔드 차트 데이터인 history.json만 추적하여 GitHub Pages 업데이트
          git add docs/api/history.json 2>/dev/null || true
          
          if ! git diff --cached --quiet; then
            git commit -m "chore: auto-update history.json [$(date +'%Y-%m-%d')]"
            git push origin HEAD:${{ github.ref_name }}
          else
            echo "No changes to commit"
          fi
